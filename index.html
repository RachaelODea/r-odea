<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="R-ODEA is an independent consultancy partnering with brands and talent across fashion, art, travel, beauty, and luxury."
    >
    <title>R-ODEA | Independent Consultancy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="intro-active">
    <section class="intro-screen" id="intro-screen" aria-label="R-ODEA introduction">
      <div class="intro-logo" aria-hidden="true">
        <img class="intro-logo-base" src="LOGO.png" alt="">
        <span class="intro-o-cover"></span>
        <span class="intro-o-spin"></span>
      </div>
      <button class="intro-enter" type="button">Enter</button>
    </section>

    <header class="site-header">
      <nav class="nav" aria-label="Site navigation">
        <div class="brand-lockup">
          <a class="wordmark" href="#top" aria-label="R-ODEA home">
            <img src="LOGO.png" alt="R-ODEA">
          </a>
          <div class="brand-links" aria-label="Primary links">
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="sectors.html">Sectors</a>
            <a href="contact.html">Contact</a>
          </div>
        </div>

        <aside class="global-panel" aria-label="Global hubs with live clocks">
          <p class="panel-label">Global hubs</p>
          <div class="clock-list">
            <span class="city-time">
              <span>Hong Kong</span>
              <time data-timezone="Asia/Hong_Kong">--:--</time>
            </span>
            <span class="city-time">
              <span>Melbourne</span>
              <time data-timezone="Australia/Melbourne">--:--</time>
            </span>
            <span class="city-time">
              <span>London</span>
              <time data-timezone="Europe/London">--:--</time>
            </span>
          </div>
        </aside>
      </nav>
    </header>

    <main id="top">
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero-layout">
          <div class="hero-copy">
            <p class="eyebrow">Independent consultancy / West to Asia and beyond</p>
            <h1 id="hero-title" class="hero-slogan">
              <span class="slogan-main">We will change</span>
              <span class="slogan-vertical">the way you look at things.</span>
            </h1>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
